name: AI Automation Pipeline

# Trigger the pipeline on pushes to main OR master
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  execute-tests:
    # GitHub provides a free Ubuntu Linux server to run our job
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 🐳 Start Dual-Stack Docker Environment
        # This is why we built docker compose! One command sets up everything in the cloud.
        run: |
          docker compose build
          docker compose up -d

      - name: 🤖 Run AI Generator and Playwright Tests
        run: docker exec playwright-ai-engine python3 generate.py features/search.feature --name search_bdd --run
        env:
          # The Python script wants 'GITHUB_TOKEN', so we feed it your custom secret!
          GITHUB_TOKEN: ${{ secrets.AI_API_KEY }}

      - name: 🛑 Shut Down Docker
        if: always()
        run: docker compose down