name: AI Automation Pipeline

# Trigger the pipeline on pushes to main OR master
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  execute-tests:
    # GitHub provides a free Ubuntu Linux server to run our job
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 🐳 Start Dual-Stack Docker Environment
        run: |
          docker compose build
          docker compose up -d
        env:
          GITHUB_TOKEN: ${{ secrets.AI_API_KEY }}

      - name: 🤖 Run AI Generator and Playwright Tests
        run: docker exec -e GITHUB_TOKEN="${{ secrets.AI_API_KEY }}" playwright-ai-engine python3 generate.py features/search.feature --name search_bdd --run

      - name: 📊 Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always() # <--- Always Uploads the report even if the tests fail!
        with:
          name: playwright-ai-report
          path: playwright-report/
          retention-days: 14

      - name: 🛑 Shut Down Docker
        if: always()
        run: docker compose down